<!DOCTYPE html>
<html>
<head>
    <title>Brawl Stars API Documentation</title>
    <link rel="stylesheet" type="text/css" href="swagger-ui.css">
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="swagger-ui-bundle.js"></script>
    <script src="swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = function() {
        SwaggerUIBundle({
          url: "/api/swagger.json",  // Путь к вашему swagger.json
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [
            SwaggerUIPreset.standalonePreset
          ],
          layout: "BaseLayout"
        });
      };
    </script>
</body>
</html>
