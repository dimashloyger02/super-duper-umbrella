<div id="methods_1"></div>

<div class="checklist">
    <h2>Чек-лист для проверки всех 9 функций</h2>

    <h3>GET запросы:</h3>
    <div class="bold">1.</div>
    <ul>
        <li><span class="status green"></span>Стоп</li>
    </ul>

</div>

<script>
let dsa = 0; // Счетчик для функций fun_
let dsb = 0; // Счетчик для textarea
let dsc = 0; // Счетчик для exec_

async function loadSwaggerSpec() {
    try {
        const response = await fetch('https://raw.githubusercontent.com/dimashloyger02/super-duper-umbrella/refs/heads/main/api/swagger.json');
        const spec = await response.json();
        
        // Получаем базовый URL из спецификации
        const baseUrl = spec.servers[0].url;
        console.log('Базовый URL:', baseUrl);
        
        // Обновление информации
        document.getElementById('title').textContent = spec.info.title;
        document.getElementById('version').textContent = spec.info.version;
        document.getElementById('openapi-version').textContent = `OAS ${spec.openapi}`;
        
        // Сохраняем базовый URL в глобальную переменную
        window.apiBaseUrl = baseUrl;
        
        // Рендеринг методов
        renderMethods(spec);
    } catch (error) {
        console.error('Ошибка загрузки спецификации:', error);
    }
}

function renderMethods(spec) {
    let html = '';
    const methodsContainer = document.getElementById('methods_1');
    
    for (let path in spec.paths) {
        for (let method in spec.paths[path]) {
            const operation = spec.paths[path][method];
            dsa++; // Увеличиваем счетчик для fun_
            dsb++; // Увеличиваем счетчик для textarea
            dsc++; // Увеличиваем счетчик для exec_
            
            html += `
                <div class="opblock opblock-${method}">
                    <button class="opblock-summary-method">
                        <span>${method.toUpperCase()}</span>
                    </button>
                    <div class="path-description">
                        <span>${path}</span>
                        <div>${operation.summary || 'Нет описания'}</div>
                    </div>
                    
                    <div class="body-param">
                        <textarea id="valtext_${dsb}" class="body-param__text"></textarea>
                        <div class="execute-wrapper">
                            <button 
                                class="btn execute opblock-control__btn"
                                onclick="fun_${dsa}()"
                            >Execute</button>
                        </div>
                    </div>
                    <pre class="microlight" style="display: block; overflow-x: auto; padding: 0.5em; background: rgb(51, 51, 51); color: white;"><code class="language-json" style="white-space: pre;"><span id="exec_${dsc}">Тут будет выведен запрос</span></code></pre>
                </div>
            `;
        }
    }
    
    methodsContainer.innerHTML = html;
    numnot()
}

// Функция для формирования URL
function getFullUrl(path) {
    return window.apiBaseUrl + path;
}

// Функция для GET запросов
function handleGetRequest(url, textareaId) {
    const textareaValue = document.getElementById(textareaId).value;
    const xhr = new XMLHttpRequest();
    
    xhr.open('GET', url, true);
    xhr.timeout = 12000;
    
    xhr.onreadystatechange = function() {
        if (this.readyState === 4) {
            if (this.status === 200) {
                try {
                    const response = JSON.parse(this.responseText);
                    console.log(response);
                } catch (error) {
                    console.error('Ошибка парсинга:', error);
                }
            } else {
                console.error('Ошибка запроса:', this.status);
            }
        }
    };
    
    xhr.send();
}

// Функция для POST запросов
function handlePostRequest(url, textareaId) {
    const textareaValue = document.getElementById(textareaId).value;
    const xhr = new XMLHttpRequest();
    
    xhr.open('POST', url, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = 12000;
    
    xhr.onreadystatechange = function() {
        if (this.readyState === 4) {
            try {
                const response = JSON.parse(this.responseText);
                console.log(response);
            } catch (error) {
                console.error('Ошибка парсинга:', error);
            }
        }
    };
    
    xhr.send(textareaValue);
}

// Общая функция для обработки PUT запросов с user_id в качестве ключа
function handleUserPutRequest(urlBase, textareaId) {
    const textareaValue = document.getElementById(textareaId).value;
    const data = JSON.parse(textareaValue);
    
    // Получаем user_id из ключей объекта
    const user_ids = Object.keys(data);
    if (user_ids.length === 0) {
        console.error('Нет user_id в данных');
        return;
    }
    
    const user_id = user_ids[0];
    const userData = data[user_id];
    
    handlePutRequest(
        getFullUrl(urlBase + '/' + user_id),
        textareaId,
        JSON.stringify(userData)
    );
}

// Базовая функция PUT запроса
function handlePutRequest(url, textareaId, data) {
    const xhr = new XMLHttpRequest();
    
    xhr.open('PUT', url, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = 12000;
    
    xhr.onreadystatechange = function() {
        if (this.readyState === 4) {
            try {
                const response = JSON.parse(this.responseText);
                console.log('Ответ:', response);
                showResponse(response, textareaId);
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
    };
    
    xhr.send(data);
}

// Функция для DELETE запросов
function handleDeleteRequest(url, textareaId) {
    const textareaValue = document.getElementById(textareaId).value;
    const xhr = new XMLHttpRequest();
    
    xhr.open('DELETE', url, true);
    xhr.timeout = 12000;
    
    xhr.onreadystatechange = function() {
        if (this.readyState === 4) {
            try {
                const response = JSON.parse(this.responseText);
                console.log(response);
            } catch (error) {
                console.error('Ошибка парсинга:', error);
            }
        }
    };
    
    xhr.send();
}

// Обновленные функции:

function fun_1() { // GET /users/all
    handleGetRequest(getFullUrl('/users/all'), 'valtext_1');
}

function fun_2() { // GET /users/{user_id}
    handleGetRequest(
        getFullUrl('/users/' + document.getElementById('valtext_2').value),
        'valtext_2'
    );
}

function fun_3() { // PUT /users/{user_id}
    handleUserPutRequest('/users', 'valtext_3');
}

function fun_4() { // DELETE /users/{user_id}
    handleDeleteRequest(
        getFullUrl('/users/' + document.getElementById('valtext_4').value),
        'valtext_4'
    );
}

function fun_5() { // POST /users
    handlePostRequest(getFullUrl('/users'), 'valtext_5');
}

function fun_6() { // GET /monitoring
    handleGetRequest(getFullUrl('/monitoring'), 'valtext_6');
}

function fun_7() { // PUT /monitoring
    handlePutRequest(
        getFullUrl('/monitoring'),
        'valtext_7',
        document.getElementById('valtext_7').value
    );
}

function fun_8() { // DELETE /monitoring
    handleDeleteRequest(getFullUrl('/monitoring'), 'valtext_8');
}

function fun_9() { // GET /player/{tag}
    handleGetRequest(
        getFullUrl('/player/' + document.getElementById('valtext_9').value),
        'valtext_9'
    );
}

        const textareas = document.querySelectorAll('.body-param__text');

        // Заполняем значения для каждого запроса
        document.getElementById('valtext_1').value = 'null'; // Для /users/all

        document.getElementById('valtext_2').value = '1'; // ID пользователя для /users/{user_id}

        document.getElementById('valtext_3').value = JSON.stringify({

        document.getElementById('valtext_5').value = JSON.stringify({
            "1763784339": {
                "click_count": 33,
                "first_name": "Dimashloyger02",
                "gems": 466557,
                "spin_count": 0,
                "stars": 0,
                "xp": 158
            }
        }, null, 2); // Данные для POST /users

        document.getElementById('valtext_6').value = 'null'; // Для GET /monitoring

        document.getElementById('valtext_7').value = JSON.stringify({
            "monitoring_players": 0,
            "monitoring_mau": 7,
            "monitoring_click_count": 549,
            "monitoring_xp": 2970,
            "monitoring_gems": 2950,
            "monitoring_payed_gems": 4228384,

            "monitoring_bank_gems": 342562,

        }, null, 2); // Данные для PUT /monitoring

        document.getElementById('valtext_8').value = 'null'; // Для DELETE /monitoring

        document.getElementById('valtext_9').value = '29G9UY820'; // Тег игрока для /player/{tag}

    } catch (error) {
        console.error('Ошибка при заполнении textarea:', error);

alert(`Data: 0`)
}

// Загрузка через функцию:
loadSwaggerSpec();
</script>
