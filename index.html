<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.000, maximum-scale=1.000, user-scalable=no, shrink-to-fit=no">
    <meta charset="utf-8">
    <title>Brawl Stars Статистика</title>
    <style>
        @font-face {
            font-family: '2';
            src: url('https://forumstatic.ru/files/001a/a3/94/73088.ttf?v=1');
        }
        body {
            background: #000;
            color: #fff;
            font-family: '2';
            padding: 10px;
            font-size: 16px;
        }
        #consoleds {
            color: #ffffff;
            margin-top: 20px;
        }
        #red{
            color: #ff0000;
        }
        #green{
            color: #00ff00;
        }
        .player-stats {
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
        }
        .controls {
            margin-bottom: 20px;
        }
    </style>

    <div class="controls">
    </div>
    
    <div id="stats-container"></div><br>
    Консоль:
    <pre id="consoleds"></pre>

<script>
// Массив тегов игроков
const players = [
    '29G9UY820',    // Дима
    'YQ9G0QGUP',    // Dexs23
    'Q9C8C9YLY',    // Дмитрий
    'YCYGVYJY9',    // 1 ЛАЙК=1 КУБОК
    'QJPR99GV2',    // Путь Славы
    'GJPYY0PLG',    // Любимый
    'GCRUP2QRL',    // Ютубер :)
    'RPVQ22QGU',    // Дима 2
    'URVG2RPVP',    // Путь 100 призов
    '298GJRG29R',    // Gemstone
    '80RCCGQL',    // holdik
    '2UCYLOYPQJ',    // Спринтер Финкс
    'ULQY2U8U'    // YT|BEZSMERTNY
];

homer = null

// Функция для получения статистики игрока
async function loadStats(playerTag) {
    try {
        const response = await fetch(`http://192.168.1.65:5000/api/player/${playerTag}`);
        
        if (!response.ok) {
            throw new Error(`Ошибка: ${response.status}`);
        }
        
        // Сохраняем результат в переменную
        const homs = await response.json();
        
        // Теперь можно использовать homs как обычную переменную
        consoleds.innerHTML += (`<span id="green">Полученные данные: ${homs}</span><br>`);
        console.log('Полученные данные:', homs);
        homer = homs
        
        // Возвращаем данные
        return homs;
        
    } catch (error) {
        consoleds.innerHTML += `<span id="red">Ошибка для тега ${playerTag}: ${error.message}</span><br>`;
        console.error(`Ошибка для тега ${playerTag}:`, error);
        return null;
    }
}

// Запускаем загрузку статистики
loadStats('29G9UY820');
</script>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
