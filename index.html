        function formatJSON(obj) {
            return JSON.stringify(obj, null, 0)
                .split('\n').join('<br>')

    <script>
// Массив рангов
const RANK_SYSTEM = [
    {"rank": "Бронза I", "elo": 0, "color": "bronza"},
    {"rank": "Бронза II", "elo": 250, "color": "bronza"},
    {"rank": "Бронза III", "elo": 500, "color": "bronza"},
    {"rank": "Серебро I", "elo": 750, "color": "silver"},

    {"rank": "Алмаз I", "elo": 2500, "color": "diamond"},
    {"rank": "Алмаз II", "elo": 3000, "color": "diamond"},
    {"rank": "Алмаз III", "elo": 3500, "color": "diamond"},
    {"rank": "Мифик I", "elo": 4000, "color": "mythic"},
    {"rank": "Мифик II", "elo": 4500, "color": "mythic"},
    {"rank": "Мифик III", "elo": 5000, "color": "mythic"},
    {"rank": "Легендарный I", "elo": 5500, "color": "legendary"},
    {"rank": "Легендарный II", "elo": 6250, "color": "legendary"},
    {"rank": "Легендарный III", "elo": 7000, "color": "legendary"},
    {"rank": "Мастер I", "elo": 9000, "color": "master"},
    {"rank": "Мастер II", "elo": 10000, "color": "master"},
    {"rank": "Мастер III", "elo": 11000, "color": "master"},
    {"rank": "Pro", "elo": 11250, "color": "pro"}
];

// Объект стилей
const RANK_COLORS = {
    bronza: "#CD7F32",
    silver: "#C0C0C0",
    gold: "#FFD700",
    diamond: "#8B4513",
    mythic: "#8A2BE2",
    legendary: "#FF0000",
    master: "#00008B",
    pro: "#FF4500"
};

function getRank(elo) {
    for (let i = RANK_SYSTEM.length - 1; i >= 0; i--) {
        if (elo >= RANK_SYSTEM[i].elo) {
            return RANK_SYSTEM[i];
        }
    }
    return RANK_SYSTEM[0];
}

        const SPREADSHEET_ID = '1zpcNSoHZaXnUDJtJMRzlWdb_5PFpSiToI_w0eqNSm0I';
        const RANGE = 'Лист1!A1:D11';
        const API_KEY = 'AIzaSyDpCRbtDnOGVs0JsFRFN7xdVkEAm1qyA_8';

        async function loadData() {
    try {
        const response = await fetch(
            `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}?key=${API_KEY}`
        );
        
        if (!response.ok) {
            throw new Error('Ошибка запроса: ' + response.statusText);
        }

        const data = await response.json();
        displayData(data.values || []);
    } catch (error) {
        console.error('Произошла ошибка:', error);
        showError('Ошибка при загрузке данных');
    }
}

function displayData(values) {
    const resultDiv = document.getElementById('result');
    let html = `
        <h2>Данные из таблицы</h2>
        <table>
            <caption>Данные из таблицы</caption>
            <thead>
                <tr>
                    <th>Имя</th>
                    <th>Elo</th>
                    <th>Pro XP</th>
                    <th>Победы</th>
                    <th>Ранг</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    values.forEach((row) => {
        if (!row[1]) return; // Пропускаем строки без Elo
        
        const elo = parseInt(row[1], 10);
        const rankInfo = getRank(elo);
        const colorName = rankInfo.color; // Получаем название цвета из rankInfo
        const color = RANK_COLORS[colorName] || '#000'; // Получаем реальный цвет

        html += `
            <tr>
                <td>${row[0] || ''}</td>
                <td>${elo}</td>
                <td>${row[2] || 0}</td>
                <td>${row[3] || 0}</td>
                <td 
                    style="
                        background: ${color};
                        font-weight: bold;
                        text-transform: capitalize
                    "
                >
                    ${rankInfo.rank}
                </td>
            </tr>
        `;
    });
    
    html += `
            </tbody>
        </table>
    `;
    resultDiv.innerHTML = html;
}

function showError(message) {
    document.getElementById('result').innerHTML = `<div class="error">${message}</div>`;
}
