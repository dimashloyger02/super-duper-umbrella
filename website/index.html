<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.000, maximum-scale=1.000, user-scalable=no, shrink-to-fit=no">
    <meta charset="utf-8">
    <title>Brawl Stars Статистика</title>
    <style>
    body {
            background: #000;
            color: #fff;
            font-family: '2';
            padding: 0px;
            font-size: 16px;
        }
        /* Стили для JSON-форматирования */
        #consoleds {
            color: #ffffff;
            margin-top: 20px;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: monospace;
            padding: 10px;
            background: rgba(0,0,0,0.8);
        }
        #red {
            color: #ff0000;
        }

        #green {
            color: #00ff00;
        }

        .player-stats {
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 14px;
        }
        
        th, td {
            padding: 8px;
            border: 1px solid #ddd;
            text-align: left;
            min-width: 60px;
            background: #0099ff;
            color: #000000;
        }
        
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>В разработке...</h1>
    <div id="version">Версия сайта: v 0.1</div>
